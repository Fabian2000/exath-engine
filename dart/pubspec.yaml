name: exath
description: >-
  Flutter plugin for the exath-engine: a complex-native math expression
  evaluator with computer algebra (diff, factor, solve, integral, ...), through
  one eval gateway. Prebuilt native libraries are bundled for every platform.
version: 1.0.1
repository: https://github.com/Fabian2000/exath-engine
issue_tracker: https://github.com/Fabian2000/exath-engine/issues
topics:
  - math
  - calculator
  - cas
  - evaluator

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ffi: ^2.1.0
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  archive: ^3.6.1

flutter:
  assets:
    - assets/wasm/exath_engine_wasm.js
    - assets/wasm/exath_engine_wasm_bg.wasm
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      web:
        pluginClass: ExathWebPlugin
        fileName: src/web_plugin.dart
