name: dart-plugin

# Builds the example app on every platform to prove the Flutter plugin works
# end to end (prebuilt native libs are fetched from the release, then bundled).

on:
  push:
    branches: [dev, main]
    paths: ["dart/**", ".github/workflows/dart-plugin.yml"]
  pull_request:
    paths: ["dart/**"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            build: flutter build linux --release
          - name: android
            os: ubuntu-latest
            build: flutter build apk --debug
          - name: web
            os: ubuntu-latest
            build: flutter build web --release
          - name: macos
            os: macos-latest
            build: flutter build macos --release
          - name: ios
            os: macos-latest
            build: flutter build ios --release --no-codesign
          - name: windows
            os: windows-latest
            build: flutter build windows --release
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Linux desktop deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config
      - name: Fetch prebuilt native libraries
        working-directory: dart
        run: |
          flutter pub get
          dart run tool/fetch_native.dart
      - name: Build example (${{ matrix.name }})
        working-directory: dart/example
        run: |
          flutter pub get
          ${{ matrix.build }}
