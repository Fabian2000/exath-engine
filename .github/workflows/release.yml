name: release

# Build prebuilt native libraries + the WASM bundle for every target and attach
# them to the GitHub Release. Triggered by pushing a version tag, e.g. v1.0.0.
# The Dart package downloads these artifacts (see dart/bin/download.dart), so a
# Dart/Flutter consumer never needs a Rust toolchain.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  native:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            libname: libexath_engine_ffi.so
            artifact: libexath_engine_ffi-linux-x64.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            libname: libexath_engine_ffi.so
            artifact: libexath_engine_ffi-linux-arm64.so
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            libname: libexath_engine_ffi.dylib
            artifact: libexath_engine_ffi-macos-x64.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            libname: libexath_engine_ffi.dylib
            artifact: libexath_engine_ffi-macos-arm64.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            libname: exath_engine_ffi.dll
            artifact: exath_engine_ffi-windows-x64.dll
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install aarch64 cross linker
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build cdylib
        run: cargo build --release -p exath-engine-ffi --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.libname }}" "${{ matrix.artifact }}"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  wasm:
    name: wasm bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build WASM
        run: cd ffi-wasm && wasm-pack build --target web
      - name: Package pkg/
        run: tar -czf exath-engine-wasm.tar.gz -C ffi-wasm/pkg .
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: exath-engine-wasm.tar.gz
